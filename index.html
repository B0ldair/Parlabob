<script>
"use strict";
/* ============================================================
   Tout en JavaScript standard. Le JSX est remplacé par la

/* ---- Connexion Supabase, ou repli local si non configuré ---- */
/* Nettoyage de l'URL : on garde uniquement le domaine https://xxxx.supabase.co.
   Si un /rest/v1 ou un slash final a été collé par erreur, on le retire,
   sinon la librairie le rajoute et l'adresse devient .../rest/v1/rest/v1/... (cassée). */
function cleanSupabaseUrl(u){
  if(!u) return "";
  u = u.trim();
  u = u.replace(/\/+$/, "");          // enlève les slashs finaux
  u = u.replace(/\/rest\/v1.*$/i, ""); // enlève un /rest/v1 (et ce qui suit) collé par erreur
  u = u.replace(/\/+$/, "");
  return u;
}
var SB_URL = cleanSupabaseUrl(CFG.SUPABASE_URL);
var SB_KEY = (CFG.SUPABASE_ANON_KEY||"").trim();

/* Détecte une clé SECRÈTE collée par erreur (interdite dans un navigateur).
   Les clés secrètes commencent par "sb_secret_" ou sont des JWT de rôle service_role.
   La bonne clé est la clé "anon"/"public" (commence par "sb_publishable_" ou
   un JWT contenant "role":"anon"). */
function looksSecret(k){
  if(!k) return false;
  if(/^sb_secret_/i.test(k)) return true;
  if(/service_role/i.test(k)) return true;
  // JWT : on tente de lire le rôle dans la charge utile
  try{
    var parts = k.split(".");
    if(parts.length===3){
      var payload = JSON.parse(atob(parts[1].replace(/-/g,"+").replace(/_/g,"/")));
      if(payload && payload.role==="service_role") return true;
    }
  }catch(e){}
  return false;
}
var KEY_IS_SECRET = looksSecret(SB_KEY);
var SB_READY = !!(SB_URL && SB_KEY && !KEY_IS_SECRET);
var sb = SB_READY ? supabase.createClient(SB_URL, SB_KEY) : null;
if(KEY_IS_SECRET){

}

/* ---- Utilitaires ---- */
function uid(){ return "v"+Math.random().toString(36).slice(2,8)+Date.now().toString(36).slice(-4); }
function fmtTime(ts){ return new Date(ts).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}); }

function lsSet(k,v){ try { localStorage.setItem(k,v); } catch(e){} }

/* ============================================================
   COUCHE DONNÉES
   ============================================================ */
var _mem = [];
var LAST_DB_ERROR = null;            // dernière erreur Supabase, pour l'afficher à l'écran
var _errListeners = [];
function setDbError(e){
  LAST_DB_ERROR = e ? (e.message || e.hint || e.details || JSON.stringify(e)) : null;
  _errListeners.forEach(function(fn){ try { fn(LAST_DB_ERROR); } catch(x){} });
}
function onDbError(fn){ _errListeners.push(fn); return function(){ _errListeners=_errListeners.filter(function(f){return f!==fn;}); }; }

function dbInsert(msg){
  if(!SB_READY){ _mem.push(msg); return Promise.resolve(); }
  return sb.from("messages").insert({ thread_id:msg.thread_id, thread_name:msg.thread_name, sender:msg.sender, text:msg.text })
    .then(function(r){
      if(r && r.error){ setDbError(r.error); console.error("Supabase insert:", r.error); }
      else { setDbError(null); }
      return r;
    })
    .catch(function(e){ setDbError(e); console.error("Supabase insert (catch):", e); });
}
function dbAllForThread(threadId){
  if(!SB_READY){ return Promise.resolve(_mem.filter(function(m){return m.thread_id===threadId;}).sort(function(a,b){return tsOf(a)-tsOf(b);})); }
  return sb.from("messages").select("*").eq("thread_id",threadId).order("created_at",{ascending:true})
    .then(function(r){
      if(r && r.error){ setDbError(r.error); console.error("Supabase select:", r.error); return []; }
      setDbError(null);
      return r.data||[];
    })
    .catch(function(e){ setDbError(e); console.error("Supabase select (catch):", e); return []; });
}
function groupThreads(rows){
  var map={};
  rows.forEach(function(m){
    if(!map[m.thread_id]) map[m.thread_id]={thread_id:m.thread_id, thread_name:m.thread_name, messages:[]};
    map[m.thread_id].messages.push(m);
  });
  return Object.keys(map).map(function(k){ return map[k]; });
}
function dbThreads(){
  if(!SB_READY){ return Promise.resolve(groupThreads(_mem.slice())); }
  return sb.from("messages").select("*").order("created_at",{ascending:true})
    .then(function(r){
      if(r && r.error){ setDbError(r.error); console.error("Supabase threads:", r.error); return []; }
      setDbError(null);
      return groupThreads(r.data||[]);
    })
    .catch(function(e){ setDbError(e); console.error("Supabase threads (catch):", e); return []; });
}
function tsOf(m){ return m.created_at ? new Date(m.created_at).getTime() : (m._t || Date.now()); }

/* ---- Sons façon MSN ---- */
var _actx;
function beep(kind){
  try{
    _actx = _actx || new (window.AudioContext||window.webkitAudioContext)();
    var seq = kind==="in" ? [660,880] : [880,660];
    seq.forEach(function(f,i){
      var o=_actx.createOscillator(), g=_actx.createGain();
      o.type="sine"; o.frequency.value=f; o.connect(g); g.connect(_actx.destination);
      var t=_actx.currentTime+i*0.1;
      g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(0.15,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.12);
      o.start(t); o.stop(t+0.13);
    });
  }catch(e){}
}

/* ---- Émoticônes ---- */
var EMOJI=[[/:-?\)/g,"\ud83d\ude42"],[/:-?D/g,"\ud83d\ude04"],[/:-?\(/g,"\ud83d\ude41"],[/;-?\)/g,"\ud83d\ude09"],[/:-?P/gi,"\ud83d\ude1b"],[/:-?O/gi,"\ud83d\ude2e"],[/<3/g,"\u2764\ufe0f"],[/\(Y\)/gi,"\ud83d\udc4d"]];
function emote(t){ var o=t; EMOJI.forEach(function(p){ o=o.replace(p[0],p[1]); }); return o; }

/* ---- Détection mobile : renvoie true sur petit écran, et se met à jour à la rotation ---- */
function useIsMobile(){
  var st=useState(typeof window!=="undefined" && window.innerWidth<=620), m=st[0], setM=st[1];
  useEffect(function(){
    function onResize(){ setM(window.innerWidth<=620); }
    window.addEventListener("resize", onResize);
    window.addEventListener("orientationchange", onResize);
    return function(){ window.removeEventListener("resize", onResize); window.removeEventListener("orientationchange", onResize); };
  },[]);
  return m;
}

/* ============================================================
   ESPACE VISITEUR
   ============================================================ */
function VisitorApp(props){
  var goHome=props.goHome;
  var s1=useState(null), threadId=s1[0], setThreadId=s1[1];
  var s2=useState(""), threadName=s2[0], setThreadName=s2[1];
  var s3=useState([]), messages=s3[0], setMessages=s3[1];
  var s4=useState(false), started=s4[0], setStarted=s4[1];
  var prevCount=useRef(0);

  useEffect(function(){
    var id=lsGet("myThreadId"), nm=lsGet("myThreadName");
    if(id){ setThreadId(id); setThreadName(nm||"Visiteur"); setStarted(true); }
  },[]);

  useEffect(function(){
    if(!threadId) return;
    var alive=true;
    function tick(){
      dbAllForThread(threadId).then(function(list){
        if(!alive) return;
        if(list.length>prevCount.current && list.length && list[list.length-1].sender==="admin") beep("in");
        prevCount.current=list.length;
        setMessages(list);
      });
    }
    tick();
    var iv=setInterval(tick,POLL_MS);
    return function(){ alive=false; clearInterval(iv); };
  },[threadId]);

  var begin=useCallback(function(){
    dbThreads().then(function(all){
      var id=uid(), name="Visiteur "+(all.length+1);
      lsSet("myThreadId",id); lsSet("myThreadName",name);
      setThreadId(id); setThreadName(name); setStarted(true);
    });
  },[]);

  var send=useCallback(function(text){
    var msg={id:uid(),thread_id:threadId,thread_name:threadName,sender:"user",text:text,_t:Date.now()};
    setMessages(function(m){ return m.concat([msg]); }); prevCount.current+=1;
    dbInsert(msg);
  },[threadId,threadName]);

  var nudge=useCallback(function(){ beep("out"); send("\u270a *toc toc !* (Wizz)"); },[send]);

  if(!started){
    return h(Center,null,
      h(Win,{ title:"Parler \u00e0 "+ADMIN_NAME+" - Messagerie", onClose:goHome, online:true, style:{width:360,maxWidth:"100%"} },
        h("div",{ style:{padding:"18px 16px",textAlign:"center",fontFamily:sysFont} },
          h(Buddy,{size:56}),
          h("div",{ style:{fontSize:17,fontWeight:700,color:C.msnBlue,margin:"10px 0 4px"} }, ADMIN_NAME+" est en ligne"),
          h("div",{ style:{fontSize:12.5,color:C.dark,marginBottom:16,lineHeight:1.5} }, "\u0c9cris-lui anonymement. Pas de nom, pas de compte."),
          h(Btn,{ primary:true, full:true, onClick:begin, style:{padding:"7px"} }, "\u2709 Envoyer un message \u00e0 "+ADMIN_NAME)
        )
      )
    );
  }
  return h(Center,null,
    h(Win,{ title:ADMIN_NAME+" - Conversation", onClose:goHome, online:true, style:{width:420,height:520,maxWidth:"100%"} },
      h(ContactStrip,{ name:ADMIN_NAME, status:"En ligne" }),
      h(MessageList,{ messages:messages, mineSender:"user" }),
      h(Composer,{ onSend:send, onNudge:nudge, placeholder:"Tape ton message\u2026" })
    )
  );
}

/* ============================================================
   ESPACE ADMIN (Bob)
   ============================================================ */
function AdminApp(props){
  var goHome=props.goHome;
  var s1=useState(false), authed=s1[0], setAuthed=s1[1];
  var s2=useState(""), code=s2[0], setCode=s2[1];
  var s3=useState(false), err=s3[0], setErr=s3[1];
  var s4=useState([]), threads=s4[0], setThreads=s4[1];
  var s5=useState(null), activeId=s5[0], setActiveId=s5[1];
  var prevTotal=useRef(0);
  var mobile = useIsMobile();

  var loadAll=useCallback(function(){
    return dbThreads().then(function(list){
      list.forEach(function(t){ t.messages.sort(function(a,b){ return tsOf(a)-tsOf(b); }); });
      list.sort(function(a,b){
        var la=a.messages[a.messages.length-1], lb=b.messages[b.messages.length-1];
        return (lb?tsOf(lb):0)-(la?tsOf(la):0);
      });
      var total=list.reduce(function(s,t){ return s+t.messages.length; },0);
      if(total>prevTotal.current && prevTotal.current!==0) beep("in");
      prevTotal.current=total;
      setThreads(list);
    });
  },[]);

  useEffect(function(){
    if(!authed) return;
    loadAll();
    var iv=setInterval(loadAll,POLL_MS);
    return function(){ clearInterval(iv); };
  },[authed,loadAll]);

  var reply=useCallback(function(text){
    if(!activeId) return;
    var t=threads.filter(function(x){return x.thread_id===activeId;})[0];
    var msg={id:uid(),thread_id:activeId,thread_name:t?t.thread_name:"Visiteur",sender:"admin",text:text,_t:Date.now()};
    setThreads(function(prev){ return prev.map(function(x){ return x.thread_id===activeId ? mix(x,{messages:x.messages.concat([msg])}) : x; }); });
    dbInsert(msg);
  },[activeId,threads]);

  function tryAuth(){ if(code===ADMIN_CODE){ setAuthed(true); beep("in"); } else setErr(true); }

  if(!authed){
    return h(Center,null,
      h(Win,{ title:"Connexion .NET Messenger", onClose:goHome, style:{width:320,maxWidth:"100%"} },
        h("div",{ style:{padding:16,textAlign:"center",fontFamily:sysFont} },
          h(Buddy,{size:48}),
          h("div",{ style:{fontSize:13,color:C.dark,margin:"10px 0 12px"} }, "Espace de "+ADMIN_NAME+". Entre ton code."),
          h(Field,{ type:"password", value:code, onChange:function(e){setCode(e.target.value);setErr(false);},
            onKeyDown:function(e){ if(e.key==="Enter") tryAuth(); }, placeholder:"Code", style:{width:"100%",textAlign:"center",marginBottom:10} }),
          err ? h("div",{ style:{color:"#B00",fontSize:12,marginBottom:8} }, "Code incorrect.") : null,
          h(Btn,{ primary:true, full:true, onClick:tryAuth, style:{padding:"6px"} }, "Se connecter")
        )
      )
    );
  }

  var active = threads.filter(function(t){return t.thread_id===activeId;})[0];

  var listInner = h(Fragment,null,
    h("div",{ style:{background:"linear-gradient(90deg,"+C.titleA+","+C.titleB+")",color:"#fff",fontSize:mobile?13:11,fontWeight:700,padding:mobile?"6px 8px":"3px 6px"} }, "En ligne ("+threads.length+")"),
    h("div",{ style:{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch"} },
      h(DbErrorBanner,null),
      threads.length===0 ? h("div",{ style:{padding:mobile?18:12,fontSize:mobile?14:12,color:C.shadow,textAlign:"center"} }, "Personne pour l'instant.") : null,
      threads.map(function(t){
        var last=t.messages[t.messages.length-1], isA=t.thread_id===activeId;
        return h("div",{ key:t.thread_id, onClick:function(){ setActiveId(t.thread_id); },
          style:{display:"flex",alignItems:"center",gap:mobile?10:6,padding:mobile?"11px 10px":"5px 6px",cursor:"pointer",background:isA?"#316AC5":"transparent",color:isA?"#fff":C.ink,borderBottom:mobile?"1px solid "+C.silver:"none",minHeight:mobile?56:0} },
          h(Buddy,{size:mobile?34:26}),
          h("div",{ style:{flex:1,minWidth:0} },
            h("div",{ style:{fontSize:mobile?15:12.5,fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"} }, t.thread_name),
            h("div",{ style:{fontSize:mobile?13:11,opacity:isA?0.85:0.6,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"} }, last?emote(last.text):"\u2014")
          ),
          mobile ? h("span",{ style:{color:isA?"#fff":C.shadow,fontSize:18} }, "\u203a") : null
        );
      })
    )
  );

  // ----- MOBILE : soit la liste plein écran, soit la conversation plein écran -----
  if(mobile){
    if(active){
      return h(Center,null,
        h(Win,{ title:active.thread_name, onClose:goHome, online:true },
          h(ContactStrip,{ name:active.thread_name, status:"Anonyme \u00b7 En ligne", onBack:function(){ setActiveId(null); } }),
          h(MessageList,{ messages:active.messages, mineSender:"admin" }),
          h(Composer,{ onSend:reply, placeholder:"R\u00e9pondre\u2026" })
        )
      );
    }
    return h(Center,null,
      h(Win,{ title:"Messages de "+ADMIN_NAME, onClose:goHome, online:true },
        h("div",{ style:mix(bevelIn,{flex:1,background:C.white,display:"flex",flexDirection:"column",fontFamily:sysFont,minHeight:0}) }, listInner)
      )
    );
  }

  // ----- DESKTOP : liste + conversation côte à côte (inchangé) -----
  var list = h("div",{ style:mix(bevelIn,{width:210,minWidth:140,background:C.white,display:"flex",flexDirection:"column",fontFamily:sysFont}) }, listInner);
  var panel = h("div",{ style:{flex:1,display:"flex",flexDirection:"column",minWidth:0} },
    active
      ? h(Fragment,null,
          h(ContactStrip,{ name:active.thread_name, status:"Anonyme \u00b7 En ligne" }),
          h(MessageList,{ messages:active.messages, mineSender:"admin" }),
          h(Composer,{ onSend:reply, placeholder:"R\u00e9pondre \u00e0 "+active.thread_name+"\u2026" })
        )
      : h("div",{ style:mix(bevelIn,{flex:1,background:C.white,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:sysFont,fontSize:13,color:C.shadow,textAlign:"center",padding:20}) },
          "Clique un contact \u00e0 gauche pour ouvrir la conversation.")
  );
  return h(Center,{ wide:true },
    h(Win,{ title:"Liste de contacts de "+ADMIN_NAME, onClose:goHome, online:true, style:{width:700,height:480,maxWidth:"100%"} },
      h("div",{ style:{display:"flex",gap:3,flex:1,minHeight:0} }, list, panel)
    )
  );
}

/* Bannière d'erreur Supabase, visible à l'écran */
function DbErrorBanner(){
  var st=useState(LAST_DB_ERROR), msg=st[0], setMsg=st[1];
  useEffect(function(){ return onDbError(setMsg); },[]);
  if(!msg) return null;
  return h("div",{ style:{background:"#FFF3CD",border:"2px solid #B00",color:"#7A0000",fontFamily:sysFont,fontSize:12,lineHeight:1.45,padding:"8px 10px",margin:"0 0 10px",textAlign:"left",wordBreak:"break-word"} },
    h("b",null,"Probl\u00e8me avec la base : "),
    msg,
    h("div",{ style:{marginTop:6,color:"#555"} }, "Astuce : si le message parle de \"row-level security\" ou \"policy\", relance le script SQL (\u00e9tape 1). S'il parle de \"relation\"/\"table\", la table n'existe pas. S'il parle de \"JWT\"/\"apikey\"/\"Invalid\", la cl\u00e9 ou l'URL est incorrecte.")
  );
}

/* Auto-test : au chargement, vérifie qu'on peut lire la table */
function selfTest(){
  if(!SB_READY) return;
  sb.from("messages").select("id").limit(1).then(function(r){
    if(r && r.error){ setDbError(r.error); console.error("Self-test:", r.error); }
  }).catch(function(e){ setDbError(e); });
}

/* Composant classe : seul moyen fiable d'attraper une erreur de rendu React enfant.
   Au lieu d'un écran blanc, affiche le message d'erreur exact. */
var ErrorBoundary = (function(){
  function EB(p){ React.Component.call(this,p); this.state={hasError:false, error:null}; }
  EB.prototype = Object.create(React.Component.prototype);
  EB.prototype.constructor = EB;
  EB.getDerivedStateFromError = function(error){ return {hasError:true, error:error}; };
  EB.prototype.componentDidCatch = function(error, info){ try{ console.error("Render error:", error, info); }catch(e){} };
  EB.prototype.render = function(){
    if(this.state.hasError){
      var msg = this.state.error && this.state.error.message ? this.state.error.message : String(this.state.error);
      return h("div",{ style:{fontFamily:sysFont,background:"#ECE9D8",border:"2px solid #808080",margin:20,padding:16,color:"#000"} },
        h("b",{ style:{color:"#B00"} }, "Une erreur s'est produite dans l'affichage :"),
        h("pre",{ style:{whiteSpace:"pre-wrap",fontSize:12,marginTop:8,fontFamily:"monospace"} }, msg)
      );
    }
    return this.props.children;
  };
  return EB;
})();

try {
  var rootEl = document.getElementById("root");
  ReactDOM.createRoot(rootEl).render(h(ErrorBoundary, null, h(App)));
  rootEl.dataset.mounted = "1";
} catch (e) {
  var r0 = document.getElementById("root");
  r0.dataset.mounted = "";
  r0.innerHTML = '<div style="font-family:Tahoma,sans-serif;background:#ECE9D8;border:2px solid #808080;margin:20px;padding:16px;color:#000"><b style="color:#B00">Erreur de démarrage :</b><br><br><code style="font-size:12px">'+(e&&e.message?e.message:e)+'</code></div>';
  throw e;
}
